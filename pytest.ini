[pytest]
# 009: the real-browser fixture suite (tests/integration, launches headless
# Edge/Chrome against local fixture pages) is opt-in — the default run
# stays fast and browser-free. Run it with:  pytest -m browser
markers =
    browser: real-browser integration tests against bundled fixture pages
    slow: real-model gates (minutes of local inference); run with -m slow
addopts = -m "not browser and not slow"
