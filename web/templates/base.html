<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ title | default("Job Engine") }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">Job&nbsp;Engine</a>
    <nav>
      <a href="/">Feed</a>
      <a href="/?min_score=70&sort=score" title="Scored jobs matching your resume at 70+">Best matches</a>
      <a href="/?status=saved">Saved</a>
      <a href="/?status=applied">Applied</a>
      <a href="/?status=hidden">Hidden</a>
      <a href="/?ineligible=1" title="Sponsorship-ineligible jobs (clearance / citizens-only / ITAR) hidden from the feed">Ineligible</a>
      <a href="/profile">Profile</a>
      <a href="/settings">Settings</a>
    </nav>
  </header>
  <main>
    {% block content %}
    <p class="empty-state">The engine is running. The feed arrives with US1.</p>
    {% endblock %}
  </main>
</body>
</html>
