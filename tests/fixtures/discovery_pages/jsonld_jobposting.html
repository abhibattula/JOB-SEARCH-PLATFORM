<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Careers — Aurora Semiconductors</title>
  <!-- schema.org JobPosting JSON-LD: the primary, site-agnostic discovery
       signal (Greenhouse/Lever/Ashby/company career pages emit this). -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org/",
    "@type": "JobPosting",
    "title": "Design Verification Engineer",
    "description": "<p>Join us to build silicon. Requires <b>python</b>, <b>verilog</b>, systemverilog and UVM. FPGA prototyping a plus.</p>",
    "hiringOrganization": { "@type": "Organization", "name": "Aurora Semiconductors" },
    "jobLocation": { "@type": "Place", "address": { "@type": "PostalAddress", "addressLocality": "Austin", "addressRegion": "TX" } }
  }
  </script>
</head>
<body>
  <h1>Design Verification Engineer</h1>
  <p>Company career page. The visible content is irrelevant to detection —
     the JSON-LD above is what the discovery copilot reads.</p>
  <!-- read-only sentinels: discovery must never click or type into these. -->
  <button id="sentinel-btn" onclick="window.__pageClicked = true">Apply</button>
  <input id="sentinel-input" value="">
</body>
</html>
