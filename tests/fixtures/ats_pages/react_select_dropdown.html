<!DOCTYPE html><html><head><meta charset="utf-8"><title>Custom combobox</title></head>
<body>
<h1>Custom dropdown (no native select)</h1>
<form id="form">
  <label>First Name<input name="first_name" type="text"></label>
  <!-- A React-Select-style widget: a div, not a <select>. It can only be
       set by CLICKING options open — which the companion must NEVER do.
       The engine must report needs_manual, never interact. -->
  <div class="rs" data-field="work_auth" role="combobox" aria-label="Work authorization">
    <div class="rs-value">Select…</div>
  </div>
</form>
<script src="/_mirror.js"></script>
</body></html>
