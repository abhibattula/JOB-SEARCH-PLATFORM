name: Release installers

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - name: Install Python dependencies (retries on transient download corruption)
        shell: bash
        run: |
          set +e
          for attempt in 1 2 3; do
            extra_args=""
            [ "$attempt" -gt 1 ] && extra_args="--no-cache-dir"
            logfile="/tmp/pip-install-attempt-$attempt.log"
            python -m pip install -r requirements.txt --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu $extra_args > "$logfile" 2>&1
            code=$?
            cat "$logfile"
            [ "$code" -eq 0 ] && exit 0
            echo "attempt $attempt failed (exit $code), retrying..." >&2
            sleep 10
          done
          msg=$(tail -c 6000 "/tmp/pip-install-attempt-3.log" | tr '\n' ' ' | tr '"' "'")
          echo "::error::pip install failed after 3 attempts (exit $code), last attempt's output: $msg"
          exit "$code"
      - run: python -m pip install pyinstaller
      - name: llama-cpp-python install canary
        run: python -c "import llama_cpp; print(llama_cpp.__version__)"
      - run: python -m pytest -q
      - name: Cache bundled model
        uses: actions/cache@v4
        with:
          path: models
          key: jobengine-models-qwen1.5b-embgemma300m-v1
      - run: python packaging/fetch_model.py
      - run: pyinstaller packaging/jobengine.spec
      - name: Install Chromium for the smoke test
        shell: bash
        run: |
          export PLAYWRIGHT_BROWSERS_PATH="$RUNNER_TEMP/jobengine-smoke-data/browsers"
          python -m playwright install chromium
      - name: Smoke test the frozen build
        run: python packaging/smoke_test.py dist/JobEngine/JobEngine.exe
      - run: choco install innosetup -y --no-progress
      - run: iscc packaging\windows.iss
      - uses: softprops/action-gh-release@v2
        with:
          files: packaging/Output/JobEngine-Setup-*.exe

  mac-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - name: Install Python dependencies (retries on transient download corruption)
        run: |
          set +e
          for attempt in 1 2 3; do
            extra_args=""
            [ "$attempt" -gt 1 ] && extra_args="--no-cache-dir"
            logfile="/tmp/pip-install-attempt-$attempt.log"
            python -m pip install -r requirements.txt --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu $extra_args > "$logfile" 2>&1
            code=$?
            cat "$logfile"
            [ "$code" -eq 0 ] && exit 0
            echo "attempt $attempt failed (exit $code), retrying..." >&2
            sleep 10
          done
          msg=$(tail -c 6000 "/tmp/pip-install-attempt-3.log" | tr '\n' ' ' | tr '"' "'")
          echo "::error::pip install failed after 3 attempts (exit $code), last attempt's output: $msg"
          exit "$code"
      - run: python -m pip install pyinstaller
      - name: llama-cpp-python install canary
        run: python -c "import llama_cpp; print(llama_cpp.__version__)"
      - run: python -m pytest -q
      - name: Cache bundled model
        uses: actions/cache@v4
        with:
          path: models
          key: jobengine-models-qwen1.5b-embgemma300m-v1
      - run: python packaging/fetch_model.py
      - run: pyinstaller packaging/jobengine.spec
      - name: Install Chromium for the smoke test
        run: |
          export PLAYWRIGHT_BROWSERS_PATH="$RUNNER_TEMP/jobengine-smoke-data/browsers"
          python -m playwright install chromium
      - name: Smoke test the frozen build
        run: python packaging/smoke_test.py "dist/Job Engine.app/Contents/MacOS/JobEngine"
      - run: bash packaging/make_dmg.sh "${GITHUB_REF_NAME#v}"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/JobEngine-*.dmg
